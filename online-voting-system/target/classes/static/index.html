<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">

    <div class="landing-wrapper">
        <div class="landing-header">
            <h1>🗳️ Online Voting System</h1>
            <p>Choose how you'd like to continue</p>
        </div>

        <div class="role-cards">

            <a href="admin.html" class="role-card admin-card">
                <div class="role-icon">🛠️</div>
                <h2>I'm an Admin</h2>
                <p>Create new polls for others to vote on</p>
            </a>

            <a href="user.html" class="role-card user-card">
                <div class="role-icon">🙋</div>
                <h2>I'm a User</h2>
                <p>View polls, cast your vote, and see results</p>
            </a>

        </div>
    </div>

</body>
</html>
