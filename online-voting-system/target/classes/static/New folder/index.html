<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🗳️ Online Voting System</h1>
    </header>

    <main>

        <!-- ============ CREATE POLL SECTION ============ -->
        <section class="card">
            <h2>Create a New Poll (Admin)</h2>
            <form id="createPollForm">
                <label for="question">Poll Question</label>
                <input type="text" id="question" placeholder="e.g. What is your favorite language?" required>

                <label>Options (2 to 4)</label>
                <input type="text" class="option-input" placeholder="Option 1" required>
                <input type="text" class="option-input" placeholder="Option 2" required>
                <input type="text" class="option-input" placeholder="Option 3 (optional)">
                <input type="text" class="option-input" placeholder="Option 4 (optional)">

                <button type="submit">Create Poll</button>
            </form>
            <p id="createPollMessage" class="message"></p>
        </section>

        <!-- ============ ALL POLLS LIST SECTION ============ -->
        <section class="card">
            <h2>All Polls</h2>
            <button id="refreshBtn">🔄 Refresh Polls</button>
            <div id="pollsList"></div>
        </section>

    </main>

    <!-- ============ VOTE / RESULTS MODAL ============ -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal">
            <button id="closeModalBtn" class="close-btn">&times;</button>
            <h2 id="modalQuestion"></h2>

            <div id="voteFormSection">
                <label for="voterEmail">Your Email</label>
                <input type="email" id="voterEmail" placeholder="you@example.com" required>

                <div id="modalOptions"></div>

                <button id="submitVoteBtn">Submit Vote</button>
                <p id="voteMessage" class="message"></p>
            </div>

            <hr>

            <div id="resultsSection">
                <h3>Live Results</h3>
                <div id="resultsList"></div>
                <button id="viewResultsBtn">View / Refresh Results</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
